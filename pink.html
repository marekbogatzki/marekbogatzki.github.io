<!DOCTYPE html>
<html>
  <head>
    <title>Licznik dni roboczych</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap">
    <style>
    body {
      background-color: #ffa5cb;
      color: #ff007f;
      text-align: center;
      font-size: 5rem;
      font-family: 'Poppins', sans-serif;
      .container {
        margin-top: 100px;
      }

      h1 {
        font-size: 10rem;
        margin: 0;
      }
    }
    </style>
  </head>
  <body onload="update()">
    <div class="container">
      <p>Pozostało:</p>
      <h1 id="liczba-dni"></h1>
      <p>dni roboczych</p>
    </div>
    <script>
      function dniRoboczeDoDaty(dataDocelowa) {
        const dzisiaj = new Date();
        const koniec = new Date(dataDocelowa);
        let dniRobocze = 0;

        while (dzisiaj <= koniec) {
          if (![6, 0].includes(dzisiaj.getDay())) {
            dniRobocze++;
          }
          dzisiaj.setDate(dzisiaj.getDate() + 1);
        }

        return dniRobocze;
      }
      function update() {
        const dataDocelowa = new Date(2025, 1, 28);
        const liczbaDniRoboczych = dniRoboczeDoDaty(dataDocelowa);
        document.getElementById('liczba-dni').innerText = liczbaDniRoboczych;
      }

    </script>
  </body>
</html>
